<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard2 • Image Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      cursor: crosshair;
    }

    /* ===== SCANLINE + GRID ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent, transparent 2px,
          rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
      pointer-events: none;
      z-index: 999;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 229, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 229, 0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== CURSOR GLOW ===== */
    #cursor-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 255, 229, 0.04) 0%, transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 998;
    }

    /* ===== UI PANEL (styled by p5) ===== */
    /* We'll use p5's createDiv, but we can inject CSS classes via style attribute */
    /* But for better control, we'll use a custom container in p5 and style it with CSS */
    .control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 280px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      background: rgba(10, 10, 15, 0.88);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 229, 0.2);
      border-radius: 8px;
      padding: 18px 16px 20px;
      color: #c8c8ff;
      font-size: 0.8rem;
      font-family: 'Share Tech Mono', monospace;
      z-index: 100;
      box-shadow: 0 0 30px rgba(0, 255, 229, 0.08);
      pointer-events: auto;
    }
    .control-panel::-webkit-scrollbar { width: 4px; }
    .control-panel::-webkit-scrollbar-track { background: transparent; }
    .control-panel::-webkit-scrollbar-thumb { background: var(--cyan, #00ffe5); border-radius: 4px; }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: #00ffe5;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(0, 255, 229, 0.2);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title span { color: #ff2d78; }

    .control-group {
      margin-bottom: 12px;
    }
    .control-group label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #5a5a8a;
      margin-bottom: 3px;
    }
    .control-group input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      background: transparent;
      margin: 4px 0;
    }
    .control-group input[type="range"]:focus { outline: none; }
    .control-group input[type="range"]::-webkit-slider-runnable-track {
      height: 3px;
      background: rgba(123, 47, 255, 0.3);
      border-radius: 2px;
    }
    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00ffe5;
      margin-top: -6px;
      box-shadow: 0 0 12px rgba(0, 255, 229, 0.4);
      cursor: pointer;
    }
    .control-group input[type="range"]::-moz-range-track {
      height: 3px;
      background: rgba(123, 47, 255, 0.3);
      border-radius: 2px;
    }
    .control-group input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00ffe5;
      border: none;
      box-shadow: 0 0 12px rgba(0, 255, 229, 0.4);
      cursor: pointer;
    }

    .control-group .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
      cursor: pointer;
    }
    .control-group .checkbox-group input[type="checkbox"] {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1px solid rgba(123, 47, 255, 0.4);
      border-radius: 3px;
      background: transparent;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
    }
    .control-group .checkbox-group input[type="checkbox"]:checked {
      background: #7b2fff;
      border-color: #7b2fff;
    }
    .control-group .checkbox-group input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: -3px;
      left: 2px;
      color: #eeeeff;
      font-size: 14px;
    }
    .control-group .checkbox-group span {
      font-size: 0.7rem;
      color: #c8c8ff;
      letter-spacing: 0.05em;
    }

    .btn {
      background: transparent;
      border: 1px solid rgba(0, 255, 229, 0.3);
      color: #00ffe5;
      padding: 6px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      margin-right: 6px;
      margin-bottom: 4px;
    }
    .btn:hover {
      background: rgba(0, 255, 229, 0.1);
      border-color: #00ffe5;
      box-shadow: 0 0 20px rgba(0, 255, 229, 0.2);
    }
    .btn-primary {
      background: rgba(0, 255, 229, 0.15);
      border-color: #00ffe5;
    }
    .btn-primary:hover {
      background: rgba(0, 255, 229, 0.25);
    }
    .btn-secondary {
      border-color: rgba(123, 47, 255, 0.4);
      color: #7b2fff;
    }
    .btn-secondary:hover {
      border-color: #7b2fff;
      background: rgba(123, 47, 255, 0.1);
    }

    .input-text {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(123, 47, 255, 0.3);
      border-radius: 4px;
      padding: 6px 10px;
      color: #c8c8ff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-text:focus {
      border-color: #00ffe5;
    }
    .input-text::placeholder {
      color: #5a5a8a;
    }

    .status-bar {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 0.7rem;
      color: #5a5a8a;
      letter-spacing: 0.1em;
      z-index: 100;
      background: rgba(10,10,15,0.7);
      padding: 6px 14px;
      border-radius: 4px;
      border-left: 2px solid #00ffe5;
    }

    .image-counter {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 0.7rem;
      color: #5a5a8a;
      letter-spacing: 0.1em;
      z-index: 100;
      background: rgba(10,10,15,0.7);
      padding: 6px 14px;
      border-radius: 4px;
      border-right: 2px solid #ff2d78;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 700px) {
      .control-panel {
        width: 230px;
        right: 10px;
        top: 10px;
        padding: 12px;
        max-height: calc(100vh - 20px);
      }
      .control-panel .panel-title { font-size: 0.8rem; }
      .btn { font-size: 0.6rem; padding: 4px 10px; }
    }
    @media (max-width: 480px) {
      .control-panel { width: 200px; right: 6px; top: 6px; padding: 10px; }
      .input-text { font-size: 0.65rem; }
    }
  </style>
</head>
<body>

  <div id="cursor-glow"></div>

  <script src="sketch.js"></script>
</body>
</html>
